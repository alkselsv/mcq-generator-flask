# MCQ Generator — nginx reverse proxy with HTTPS and Basic Auth.
# Backend: docker-compose web service on 127.0.0.1:5000

# HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    access_log /var/log/nginx/qg-access.log;
    error_log  /var/log/nginx/qg-error.log;

    return 301 https://$host$request_uri;
}

# HTTPS + Basic Auth
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    access_log /var/log/nginx/qg-access.log;
    error_log  /var/log/nginx/qg-error.log;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 256k;
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        auth_basic "Questions Generator";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Optional IP whitelist — enable after copying ip-whitelist.conf:
        # include /etc/nginx/snippets/mcq-ip-whitelist.conf;

        include proxy_params;
        proxy_pass http://127.0.0.1:5000;
        proxy_request_buffering off;

        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
